<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新闻作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            transition: opacity 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 宽高比 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #000;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .audio-container {
            width: 100%;
            margin-bottom: 15px;
        }
        
        .audio-container audio {
            width: 100%;
            border-radius: 8px;
        }
        
        /* 移动端优化 */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }
            
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .card {
                padding: 20px;
            }
            
            .card h2 {
                font-size: 1.5em;
            }
            
            .video-container {
                padding-bottom: 56.25%; /* 保持 16:9 */
            }
        }
        
        @media screen and (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }
            
            .card h2 {
                font-size: 1.3em;
            }
            
            .btn {
                font-size: 1em;
                padding: 10px;
            }
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 新闻作品集</h1>
        
        <div class="grid">
            <!-- 数据新闻 -->
            <div class="card">
                <h2>📊 数据新闻</h2>
                <p>通过数据可视化呈现新闻故事，让复杂的信息变得直观易懂。</p>
                <a href="https://20060410-lin.github.io/vacation/" target="_blank" class="btn">查看作品</a>
            </div>
            
            <!-- 短视频新闻 -->
            <div class="card">
                <h2>🎬 短视频新闻</h2>
                <p>用短视频形式快速传递新闻信息，适合移动端观看。</p>
                <div class="video-container">
                    <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=1692481035&bvid=BV1T6Ti6TEDq&cid=2686436052&p=1&autoplay=0&mobi=1" 
                        scrolling="no" 
                        border="0" 
                        frameborder="no" 
                        framespacing="0" 
                        allowfullscreen="true"
                        allow="autoplay; encrypted-media">
                    </iframe>
                </div>
                <p style="font-size: 0.9em; color: #999;">📌 支持手机端播放，点击全屏可获得更好体验</p>
            </div>
            
            <!-- 昌吉实践H5新闻 -->
            <div class="card">
                <h2>📍 昌吉实践H5新闻</h2>
                <p>交互式H5新闻作品，结合多媒体元素呈现新闻报道。</p>
                <div class="video-container">
                    <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=1692481262&bvid=BV1M6Ti6TETK&cid=2686436523&p=1&autoplay=0&mobi=1" 
                        scrolling="no" 
                        border="0" 
                        frameborder="no" 
                        framespacing="0" 
                        allowfullscreen="true"
                        allow="autoplay; encrypted-media">
                    </iframe>
                </div>
                <p style="font-size: 0.9em; color: #999;">📌 支持手机端播放，点击全屏可获得更好体验</p>
            </div>
            
            <!-- 博客新闻 -->
            <div class="card">
                <h2>🎙️ 博客新闻</h2>
                <p>音频新闻形式，适合通勤等场景下收听。</p>
                <div class="audio-container">
                    <audio controls preload="metadata" style="width: 100%;">
                        <source src="https://20060410-lin.github.io/beautiful/audio.mp3" type="audio/mpeg">
                        您的浏览器不支持音频播放，请升级浏览器。
                    </audio>
                </div>
                <p style="font-size: 0.9em; color: #999;">📌 支持手机端播放，点击播放按钮即可收听</p>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 新闻作品集 | 适配 PC & 移动端</p>
        </div>
    </div>
</body>
</html>
